name: Deploy Backend to AWS

# MANUAL ONLY — trigger from GitHub Actions tab when AWS is configured.
# Auto-deploy on push is disabled until AWS secrets are set up.
# To enable auto-deploy later, uncomment the push trigger below.
on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'Backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          cd Backend
          mvn test

      - name: Build JAR (production)
        run: |
          cd Backend
          mvn clean package -DskipTests
          ls -lh target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp Backend/target/samaysetu-0.0.1-SNAPSHOT.jar \
            s3://${{ secrets.S3_BUCKET }}/samaysetu-0.0.1-SNAPSHOT.jar

      - name: Trigger Auto Scaling Group Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --preferences '{
              "MinHealthyPercentage": 100,
              "InstanceWarmup": 600,
              "CheckpointPercentages": [50, 100],
              "CheckpointDelay": 300
            }' \
            || echo "Instance refresh already in progress or not needed"

      - name: Deployment complete
        run: |
          echo "JAR uploaded to S3 successfully!"
          echo "Auto Scaling Group will pick up the new version automatically"
          echo "Monitor: AWS Console -> EC2 -> Target Groups -> samaysetu-tg"
