name: CI — Build & Test

on:
  push:
    branches: [main, feat/*, fix/*, release/*]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          cd Backend
          mvn test

      - name: Build JAR
        run: |
          cd Backend
          mvn clean package -DskipTests
          echo "Build successful — JAR size:"
          ls -lh target/samaysetu-*.jar
