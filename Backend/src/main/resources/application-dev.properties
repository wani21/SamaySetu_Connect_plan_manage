# Development Profile Configuration
# Active when: spring.profiles.active=dev

spring.application.name=samaysetu

## Development Database Configuration (PostgreSQL Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/SamaySetu}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT Configuration
# Must be a valid Base64-encoded string (letters, digits, +, /, = only; NO hyphens or underscores)
# This is the Base64 of "samaysetuSecretKeyForJwtTokenGenerationDevEnv1234567890"
jwt.secret.key=${JWT_SECRET_KEY:c2FtYXlzZXR1U2VjcmV0S2V5Rm9ySnd0VG9rZW5HZW5lcmF0aW9uRGV2RW52MTIzNDU2Nzg5MA==}

# Server Configuration
server.port=${PORT:8083}

# Request size limits (match prod)
server.tomcat.max-http-post-size=5242880
server.tomcat.max-swallow-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Flyway Database Migrations
# Currently disabled — schema is managed by Hibernate ddl-auto=update in dev.
# When ready to adopt Flyway:
#   1. Create Backend/src/main/resources/db/migration/ directory
#   2. Add V1__baseline.sql with current schema (pg_dump --schema-only)
#   3. Set spring.flyway.enabled=true
#   4. Set spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=false
# Redis Configuration (No Password Needed)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Optional: Connection pool settings
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.timeout=2000ms

# Email Sender Display Name
app.email.from-name=SamaySetu Admin

# Application Base URL (Development)
app.base-url=${APP_BASE_URL:http://localhost:8083}

# Frontend URL (used for password reset links, email redirects)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Admin initialization (dev defaults — production uses env vars only)
app.admin.email=suryankadmin@mitaoe.ac.in
app.admin.password=Admin@123

# Timetable Constraints
app.timetable.max-periods-per-day=6

# CSV Staff Upload - Default password for testing
# In dev, use a known password so you can test login easily
# Set to "random" in production to auto-generate unique passwords
app.staff.default-password=mitaoe@123

# Rate Limiting (auth endpoints)
# Max 20 requests per minute per IP in dev (generous for testing)
app.rate-limit.max-requests=20
app.rate-limit.window-ms=60000

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.College.timetable=DEBUG
