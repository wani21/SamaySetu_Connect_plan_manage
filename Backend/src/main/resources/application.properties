# Spring Boot Application Configuration
#
# Active Profile — set via environment variable, NOT hardcoded here.
#   Local dev:  SPRING_PROFILES_ACTIVE=dev  (or pass -Dspring.profiles.active=dev)
#   Production: SPRING_PROFILES_ACTIVE=prod (set in EC2 user data / systemd service)
#
# If no profile is set, Spring Boot will use ONLY this file (no dev/prod overrides).
# This intentionally fails fast on missing DB config to prevent accidental prod runs.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Name
spring.application.name=samaysetu
