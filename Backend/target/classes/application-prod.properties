# ============================================================
# Production Profile Configuration
# Active when: spring.profiles.active=prod
#
# PRINCIPLE: Every secret/URL uses ${ENV_VAR} with NO default.
# If the variable is missing, Spring Boot will FAIL TO START.
# This is intentional — fail fast, don't run with wrong config.
#
# REQUIRED GitHub Secrets (set in repo Settings → Secrets):
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
#   SPRING_DATASOURCE_PASSWORD, JWT_SECRET_KEY,
#   EMAIL_USERNAME, EMAIL_PASSWORD,
#   APP_BASE_URL, APP_FRONTEND_URL, APP_CORS_ALLOWED_ORIGINS,
#   REDIS_HOST, REDIS_PORT, REDIS_PASSWORD
# ============================================================

spring.application.name=samaysetu

# ----------------------------------------------------------
# Database (PostgreSQL)
# ----------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Hibernate must NOT touch prod schema (Flyway owns it)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# HikariCP — tuned for production load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# ----------------------------------------------------------
# Flyway Database Migrations
# Currently disabled — enable when migration files are created.
# Schema validated by Hibernate ddl-auto=validate below.
# ----------------------------------------------------------
spring.flyway.enabled=false

# ----------------------------------------------------------
# Redis + Cache (production)
# ----------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ----------------------------------------------------------
# JWT
# ----------------------------------------------------------
jwt.secret.key=${JWT_SECRET_KEY}

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server.port=${PORT:8080}

# Request size limits — prevent oversized payloads
server.tomcat.max-http-post-size=5242880
server.tomcat.max-swallow-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ----------------------------------------------------------
# Email (Gmail SMTP)
# ----------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.email.from-name=SamaySetu Admin

# ----------------------------------------------------------
# Application URLs
# ----------------------------------------------------------
# Backend base URL (used for email verification links)
app.base-url=${APP_BASE_URL}

# Frontend URL (used for password reset links, email redirects)
# CRITICAL: Without this, email links point to localhost:5173
app.frontend.url=${APP_FRONTEND_URL}

# CORS allowed origins (your Amplify frontend URL)
# CRITICAL: Without this, CORS defaults to localhost:5173 and blocks prod frontend
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ----------------------------------------------------------
# Admin Initialization (first-run only)
# ----------------------------------------------------------
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.name=${APP_ADMIN_NAME:Admin User}
app.admin.employee-id=${APP_ADMIN_EMPLOYEE_ID:EMP00001}

# ----------------------------------------------------------
# Staff Upload
# ----------------------------------------------------------
# "random" = each staff gets a unique UUID-based password
app.staff.default-password=random

# ----------------------------------------------------------
# Rate Limiting (auth endpoints)
# ----------------------------------------------------------
app.rate-limit.max-requests=10
app.rate-limit.window-ms=60000

# ----------------------------------------------------------
# Logging — minimal for production
# ----------------------------------------------------------
logging.level.root=INFO
logging.level.com.College.timetable=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# ----------------------------------------------------------
# Error Response — suppress internals
# ----------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ----------------------------------------------------------
# Actuator — expose only what's needed
# ----------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
